<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Hello World</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: linear-gradient(-45deg, #0f172a, #1e293b, #0ea5e9, #7c3aed);
      background-size: 400% 400%;
      animation: bgMove 12s ease infinite;
      padding: 20px;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      width: 100%;
      max-width: 700px;
      padding: 40px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      filter: blur(50px);
      top: -120px;
      right: -100px;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 800;
      letter-spacing: -2px;
      margin-bottom: 10px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    p {
      font-size: clamp(1rem, 3vw, 1.2rem);
      opacity: 0.85;
      margin-bottom: 30px;
    }

    .btn-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 14px 24px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .primary {
      background: white;
      color: #111827;
    }

    .primary:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 25px rgba(255,255,255,0.25);
    }

    .secondary {
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .secondary:hover {
      transform: scale(1.08);
      background: rgba(255,255,255,0.2);
    }

    .emoji {
      font-size: 4rem;
      margin-top: 25px;
      transition: transform 0.4s ease;
    }

    .spin {
      transform: rotate(360deg) scale(1.2);
    }

    @media (max-width: 600px) {
      .card {
        padding: 28px;
      }

      .btn-group {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="glow"></div>

    <h1 id="title">Hello World 👋</h1>

    <p>
      A futuristic interactive landing page built with pure HTML, CSS & JavaScript.
    </p>

    <div class="btn-group">
      <button class="primary" onclick="changeMessage()">
        Change Greeting
      </button>

      <button class="secondary" onclick="spinEmoji()">
        Tech Magic ✨
      </button>
    </div>

    <div class="emoji" id="emoji">🤖</div>
  </div>

  <script>
    const messages = [
      "Hello World 👋",
      "Welcome Human 🤖",
      "Future Starts Here 🚀",
      "Coding is Fun 💻",
      "Modern Web Magic ✨"
    ];

    let index = 0;

    function changeMessage() {
      index = (index + 1) % messages.length;
      document.getElementById("title").textContent = messages[index];
    }

    function spinEmoji() {
      const emoji = document.getElementById("emoji");

      emoji.classList.add("spin");

      setTimeout(() => {
        emoji.classList.remove("spin");
      }, 400);
    }

    // Mouse glow effect
    document.addEventListener("mousemove", (e) => {
      const glow = document.querySelector(".glow");

      glow.style.left = e.clientX - 150 + "px";
      glow.style.top = e.clientY - 150 + "px";
    });
  </script>

</body>
</html>
